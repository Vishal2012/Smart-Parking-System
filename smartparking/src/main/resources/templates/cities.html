<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select City - Smart Parking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #e1bee7);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .city-card {
            transition: 0.3s ease;
        }

        .city-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .welcome-text {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        footer {
            margin-top: auto;
            padding: 1rem;
            background-color: #f8f9fa;
            text-align: center;
        }

        footer form {
            display: inline-block;
        }

        .btn-sm {
            min-width: 110px;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <div class="row mb-2 align-items-center">
        <div class="col-md-6">
            <div class="welcome-text">Welcome, <span th:text="${username}">User</span></div>
        </div>
        <div class="col-md-6 text-end">
            <a href="/my-bookings" class="btn btn-primary btn-sm"> My Bookings</a>
        </div>
    </div>

    <div class="text-center my-3">
        <h2 class="fw-bold text-primary"> Select a City </h2>
        <p class="text-muted">Choose your city to explore available parking areas</p>
    </div>

    <div th:if="${param.booked}" class="alert alert-success text-center">
    </div>

    <div class="row justify-content-center" th:if="${cities}">
        <div class="col-md-10">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div class="col" th:each="city : ${cities}">
                    <a th:href="@{'/dashboard/areas/' + ${city.id}}" class="text-decoration-none">
                        <div class="card city-card h-100 shadow-sm text-center">
                            <div class="card-body">
                                <h5 class="card-title text-primary fw-bold" th:text="${city.name}">City Name</h5>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-danger btn-sm"> Logout </button>
    </form>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
