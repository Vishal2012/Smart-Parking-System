<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Area - Smart Parking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #80deea, #ce93d8);
            background-size: 300% 300%;
            animation: moveBg 10s ease infinite;
            min-height: 100vh;
        }

        @keyframes moveBg {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .area-card {
            transition: 0.3s ease;
            border-radius: 10px;
        }

        .area-card:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        h2 {
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4 text-dark">Select an Area</h2>

    <div class="row justify-content-center" th:if="${areas}">
        <div class="col-md-10">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div class="col" th:each="area : ${areas}">
                    <a th:href="@{'/dashboard/slots/' + ${area.id}}" class="text-decoration-none">
                        <div class="card area-card h-100 shadow-sm text-center">
                            <div class="card-body">
                                <h5 class="card-title text-primary fw-bold" th:text="${area.name}">Area Name</h5>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
