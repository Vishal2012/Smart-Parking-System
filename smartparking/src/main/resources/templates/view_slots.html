<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Slots - Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .table-wrapper {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        h2 {
            font-weight: bold;
            color: #343a40;
        }
        .status-booked {
            color: #dc3545;
            font-weight: bold;
        }
        .status-available {
            color: #198754;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container my-5">
    <div class="table-wrapper">
        <h2 class="text-center mb-4">🅿️ All Parking Slots</h2>

        <table class="table table-bordered table-hover align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Slot Name</th>
                <th>Area</th>
                <th>City</th>
                <th>Status</th>
                <th>Car Number</th>
                <th>Booked By</th>
                <th>Booking Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="slot, iter : ${slots}">
                <td th:text="${iter.count}">1</td>
                <td th:text="${slot.slotName}">Slot A</td>
                <td th:text="${slot.area != null ? slot.area.name : '-'}">Area</td>
                <td th:text="${slot.area != null and slot.area.city != null ? slot.area.city.name : '-'}">City</td>

                <td>
                    <span th:if="${bookingMap[slot.id] != null}" class="status-booked">Booked</span>
                    <span th:if="${bookingMap[slot.id] == null}" class="status-available">Available</span>
                </td>

                <td th:text="${bookingMap[slot.id] != null ? bookingMap[slot.id].carNumber : '-'}">Car No</td>
                <td th:text="${bookingMap[slot.id] != null ? bookingMap[slot.id].user.username : '-'}">User</td>
                <td th:text="${bookingMap[slot.id] != null ? #temporals.format(bookingMap[slot.id].bookingTime, 'dd-MM-yyyy HH:mm') : '-'}">Date</td>
            </tr>
            </tbody>
        </table>

        <div class="text-end">
            <a href="/admin/dashboard" class="btn btn-secondary">⬅️ Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
