<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add City - Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg rounded-4">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4 text-primary"> Add New City</h3>

                    <form th:action="@{/admin/add-city}" method="post" th:object="${city}">
                        <div class="mb-3">
                            <label class="form-label">City Name</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Enter city name" required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin/dashboard" class="btn btn-outline-secondary">← Back to Dashboard</a>
                            <button class="btn btn-success">Add City ✅</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
