<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Slot - Smart Parking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Style -->
    <style>
        body {
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .card {
            transition: 0.4s ease;
            border-radius: 15px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .btn-success {
            background-color: #43a047;
            border: none;
        }

        .btn-success:hover {
            background-color: #2e7d32;
        }

        h2 {
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #00000055;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">Book a Parking Slot</h2>

    <!-- Show alert if no slots -->
    <div th:if="${slots.isEmpty()}" class="alert alert-warning text-center">
        No available slots.
    </div>

    <!-- List of available slots -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="slot : ${slots}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title text-primary fw-bold" th:text="${slot.slotName}">Slot Name</h5>

                    <form th:action="@{/dashboard/book-slot}" method="post" class="mt-3">
                        <input type="hidden" name="slotId" th:value="${slot.id}" />
                        <div class="mb-3">
                            <input type="text" name="carNumber" class="form-control" placeholder="Enter Car Number" required />
                        </div>
                        <button type="submit" class="btn btn-success w-100">Book Slot</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
