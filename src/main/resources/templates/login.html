<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login & Register - Smart Parking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
            font-family: 'Rubik', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card {
            background: #ffffff;
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 35px;
            max-width: 500px;
            width: 100%;
        }

        .nav-tabs {
            border-bottom: none;
            justify-content: center;
            margin-bottom: 25px;
        }

        .nav-tabs .nav-link {
            border: none;
            background: none;
            color: #555;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .nav-tabs .nav-link.active {
            background-color: #0d6efd;
            color: #fff !important;
            border-radius: 30px;
            padding: 8px 24px;
        }

        .form-label {
            font-weight: 500;
            color: #333;
        }

        .form-control, .form-select {
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .input-group-text {
            background-color: #f0f0f0;
            border: none;
        }

        button {
            border-radius: 12px;
            font-weight: 600;
        }

        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .input-group {
            border: 1px solid #ccc;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Nav Tabs -->
    <ul class="nav nav-tabs" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
        </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content" id="authTabsContent">
        <!-- Login Form -->
        <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-user"></i></span>
                        <input type="text" name="username" class="form-control" required placeholder="Enter username">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" required placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
            </form>

            <div th:if="${param.error}" class="alert alert-danger mt-3">
                Invalid username or password!
            </div>
            <div th:if="${param.success}" class="alert alert-success mt-3">
                Registered successfully! Please login.
            </div>
        </div>

        <!-- Register Form -->
        <div class="tab-pane fade" id="register" role="tabpanel">
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-user-plus"></i></span>
                        <input type="text" th:field="*{username}" class="form-control" required placeholder="Choose username">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-key"></i></span>
                        <input type="password" th:field="*{password}" class="form-control" required placeholder="Create password">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select th:field="*{role}" class="form-select" required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="USER">User</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100 mt-3">Register</button>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
