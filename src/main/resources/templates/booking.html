<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All My Bookings - Smart Parking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-active {
            color: green;
            font-weight: bold;
        }
        .status-cancelled {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4">My Booking History</h2>

    <div th:if="${param.cancel}" class="alert alert-success">
        Booking cancelled successfully!
    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>City</th>
            <th>Area</th>
            <th>Slot Number</th>
            <th>Car Number</th>
            <th>Booking Time</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="booking : ${allBookings}">
            <td th:text="${booking.slot?.area?.city?.name}">City</td>
            <td th:text="${booking.slot?.area?.name}">Area</td>
            <td th:text="${booking.slot?.slotName}">Slot</td>
            <td th:text="${booking.carNumber}">Car Number</td>
            <td th:text="${#temporals.format(booking.bookingTime, 'dd-MM-yyyy HH:mm')}">Time</td>
            <td>
                <span th:if="${!booking.cancelled}" class="status-active">Active</span>
                <span th:if="${booking.cancelled}" class="status-cancelled">Cancelled</span>
            </td>
            <td>
                <a th:if="${!booking.cancelled}"
                   th:href="@{'/cancel-booking/' + ${booking.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to cancel this booking?');">
                    Cancel
                </a>
                <span th:if="${booking.cancelled}" class="text-muted">—</span>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(allBookings)}">
            <td colspan="7" class="text-center">No bookings found.</td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
</div>

</body>
</html>
