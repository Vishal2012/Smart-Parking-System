<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Slot - Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg rounded-4">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4 text-primary"> Add New Slot</h3>

                    <form th:action="@{/admin/add-slot}" method="post" th:object="${slot}">
                        <div class="mb-3">
                            <label class="form-label">Slot Number</label>
                            <input type="text" class="form-control" th:field="*{slotName}" placeholder="Enter slot name/number" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Area</label>
                            <select class="form-select" th:field="*{area.id}" required>
                                <option value="">-- Select Area --</option>
                                <option th:each="a : ${areas}" th:value="${a.id}" th:text="${a.name}"></option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin/dashboard" class="btn btn-outline-secondary">← Back to Dashboard</a>
                            <button class="btn btn-success">Add Slot ✅</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
