<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Smart Parking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            position: fixed;
            width: 250px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .dashboard-content {
            margin-left: 250px;
            padding: 30px;
        }
        .logout-form {
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div>
        <h4 class="text-center"> Admin Panel</h4>
        <hr style="border-color: rgba(255,255,255,0.2)">
        <a href="/admin/add-city"><i class="fas fa-city me-2"></i> Add City</a>
        <a href="/admin/add-area"><i class="fas fa-map-marker-alt me-2"></i> Add Area</a>
        <a href="/admin/add-slot"><i class="fas fa-car me-2"></i> Add Slot</a>
        <a href="/admin/view-slots"><i class="fas fa-list me-2"></i> View Slots</a>
    </div>

    <div class="logout-form">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger w-100">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
        </form>
    </div>
</div>

<!-- Main Dashboard Content -->
<div class="dashboard-content">
    <h2 class="mb-4">Welcome to Admin Dashboard</h2>

    <div th:if="${param.city_added}" class="alert alert-success"> City added successfully!</div>
    <div th:if="${param.area_added}" class="alert alert-success"> Area added successfully!</div>
    <div th:if="${param.slot_added}" class="alert alert-success"> Slot added successfully!</div>

    <div class="row mt-4">
        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <i class="fas fa-city fa-2x mb-2 text-primary"></i>
                    <h5 class="card-title">Add City</h5>
                    <a href="/admin/add-city" class="btn btn-outline-primary mt-2">Go</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <i class="fas fa-map-marker-alt fa-2x mb-2 text-success"></i>
                    <h5 class="card-title">Add Area</h5>
                    <a href="/admin/add-area" class="btn btn-outline-success mt-2">Go</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <i class="fas fa-car fa-2x mb-2 text-danger"></i>
                    <h5 class="card-title">Add Slot</h5>
                    <a href="/admin/add-slot" class="btn btn-outline-danger mt-2">Go</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <i class="fas fa-list fa-2x mb-2 text-dark"></i>
                    <h5 class="card-title">View All Slots</h5>
                    <a href="/admin/view-slots" class="btn btn-outline-dark mt-2">Go</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
